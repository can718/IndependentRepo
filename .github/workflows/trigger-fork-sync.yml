name: Trigger Fork Sync Upstream

on:
  schedule:
    # 避开整点/半点以降低被 GitHub 延迟或丢弃的概率
    - cron: '32 9 * * *' # UTC 09:32 → 北京时间 17:32
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync workflow in your Fork repo
        uses: benc-uk/workflow-dispatch@v1
        with:
          repo: can718/PSAppDeployToolkit
          workflow: "Sync Upstream"
          ref: main
          token: ${{ secrets.FORK_TRIGGER_PAT }}
